name: Hello World

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  greet:
    runs-on: ubuntu-latest
    steps:
      - name: Print a greeting
        run: echo "Hello, GitHub Actions!"

      - name: Show date and runner info
        run: |
          echo "현재 시각: $(date)"
          echo "실행 환경: $RUNNER_OS"
