name: Python Tests
 
on:
  push:
    branches: [ "main" ]
  pull_request:                 # PR이 생성/갱신될 때도 실행
    branches: [ "main" ]
 
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      # 1) 저장소 코드를 가상머신으로 가져오기
      - name: Check out repository
        uses: actions/checkout@v4
 
      # 2) 파이썬 설치
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
 
      # 3) 의존성 설치
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
 
      # 4) 테스트 실행
      - name: Run tests
        run: pytest -v
